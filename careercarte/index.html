<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CareerCarte — Prototype</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  :root{
    --teal:#0f766e; --teal600:#0d9488; --ink:#334155; --muted:#64748b; --line:#e2e8f0;
  }
  *{box-sizing:border-box}
  body{margin:0;background:#EEF1F6;color:var(--ink);
    font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  .ic{display:inline-block;vertical-align:middle;flex:none}
  .wrap{max-width:900px;margin:0 auto;padding:20px 12px 8px}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin:0 4px 12px}
  .logo{display:flex;align-items:center;gap:8px}
  .logo .mark{width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,#0d9488,#0f766e);color:#fff}
  .logo .name{font-weight:600;color:#1e293b;font-size:14px}
  .topbar .sub{font-size:12px;color:var(--muted);margin-left:2px}
  .restart{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:500;color:var(--muted);
    border:1px solid #cbd5e1;background:#fff;border-radius:8px;padding:6px 10px}
  .restart:hover{color:#0f172a}
  .browser{border-radius:16px;background:#fff;box-shadow:0 18px 40px -12px rgba(15,23,42,.25);border:1px solid var(--line);overflow:hidden}
  .chrome{display:flex;align-items:center;gap:12px;padding:0 16px;height:44px;background:#F6F7F9;border-bottom:1px solid var(--line)}
  .dots{display:flex;gap:6px}
  .dots span{width:12px;height:12px;border-radius:50%}
  .dots .r{background:#fda4af}.dots .y{background:#fcd34d}.dots .g{background:#6ee7b7}
  .addr{flex:1;display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);border-radius:6px;
    padding:0 12px;height:28px;font-size:12px;color:var(--muted)}
  .exticon{width:28px;height:28px;border-radius:6px;border:1px solid #99f6e4;background:#f0fdfa;color:var(--teal600);
    display:flex;align-items:center;justify-content:center}
  .viewport{position:relative;height:560px;overflow:hidden}
  #page{position:absolute;inset:0;overflow-y:auto;padding:24px 32px 112px}
  #bubble{position:absolute;right:12px;bottom:12px;z-index:30}
  #overlays{position:absolute;inset:0;pointer-events:none;z-index:40}
  /* form */
  .form{max-width:560px;margin:0 auto}
  .jobhead .eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#94a3b8;font-weight:500}
  .jobhead h1{font-size:18px;font-weight:600;color:#334155;margin:2px 0 2px}
  .jobhead p{font-size:12px;color:#94a3b8;margin:0}
  .stepper{display:flex;gap:6px;margin-top:18px}
  .stepper .col{flex:1}
  .stepper .tick{height:4px;border-radius:999px;background:#e2e8f0}
  .stepper .col.done .tick{background:#14b8a6}
  .stepper .lbl{margin-top:6px;font-size:10px;font-weight:500;color:#cbd5e1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .stepper .col.cur .lbl{color:#334155}
  .fields{margin-top:20px;display:flex;flex-direction:column;gap:16px}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .field label{font-size:12px;font-weight:500;color:var(--muted)}
  .field .req{color:#fb7185}
  .frow{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
  .hint{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:var(--teal600);font-weight:500}
  .box{position:relative;border:1px solid var(--line);border-radius:8px;background:#fff;transition:all .15s}
  .box .val{height:40px;padding:0 12px;display:flex;align-items:center;font-size:14px;color:#334155}
  .box.area .val{min-height:64px;height:auto;padding:8px 12px;display:block;line-height:1.5}
  .box .ph{color:#cbd5e1}
  .box.fillable{cursor:pointer;border-style:dashed}
  .box.fillable:hover{border-color:#2dd4bf;background:rgba(240,253,250,.5)}
  .box .bar{position:absolute;left:0;top:8px;bottom:8px;width:2px;border-radius:999px}
  .box.r-emerald{border-color:#86efac}.box.r-amber{border-color:#fcd34d}.box.r-violet{border-color:#c4b5fd}
  .box.r-slate{border-color:#cbd5e1}.box.r-teal{border-color:#5eead4}
  .voicebtn{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;
    color:#6d28d9;background:#f5f3ff;border:1px solid #ddd6fe;border-radius:6px;padding:4px 8px;margin:0 12px 10px}
  .voicebtn:hover{background:#ede9fe}
  .fhint{font-size:11px;color:#94a3b8;margin:4px 0 0}
  /* chips */
  .chip{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:500;border-radius:999px;border:1px solid;padding:2px 6px}
  .chip.emerald{color:#047857;background:#ecfdf5;border-color:#a7f3d0}
  .chip.amber{color:#b45309;background:#fffbeb;border-color:#fde68a}
  .chip.violet{color:#6d28d9;background:#f5f3ff;border-color:#ddd6fe}
  .chip.slate{color:#475569;background:#f1f5f9;border-color:#e2e8f0}
  .chip.teal{color:#0f766e;background:#f0fdfa;border-color:#99f6e4}
  /* radio */
  .opts{display:flex;gap:8px}
  .opt{display:flex;align-items:center;gap:8px;font-size:14px;border:1px solid var(--line);border-radius:8px;padding:8px 14px;color:#94a3b8}
  .opts.fillable .opt{border-style:dashed}
  .opts.fillable{cursor:pointer}
  .opts.fillable:hover .opt{border-color:#2dd4bf}
  .opt .rb{width:14px;height:14px;border-radius:50%;border:1px solid #cbd5e1;display:flex;align-items:center;justify-content:center}
  .opt.on{color:#065f46;border-color:#86efac;background:#ecfdf5}
  .opt.on .rb{border-color:#10b981;background:#10b981}
  .opt.on.amber{color:#92400e;border-color:#fcd34d;background:#fffbeb}
  .opt.on.amber .rb{border-color:#f59e0b;background:#f59e0b}
  .opt.on .rb i{width:6px;height:6px;border-radius:50%;background:#fff;display:block}
  /* dropdown */
  .dropdown{position:relative}
  .ddbtn{width:100%;height:40px;padding:0 12px;display:flex;align-items:center;justify-content:space-between;
    border:1px solid var(--line);border-radius:8px;background:#fff;font-size:14px;color:#94a3b8}
  .ddbtn.set{color:#334155;border-color:#cbd5e1}
  .ddbtn .lft{display:flex;align-items:center;gap:8px}
  .ddbtn .bar{width:2px;height:16px;border-radius:999px}
  .ddbtn .chev{transition:transform .15s;color:#94a3b8}
  .ddbtn.open .chev{transform:rotate(180deg)}
  .ddmenu{position:absolute;left:0;right:0;margin-top:4px;z-index:30;border:1px solid var(--line);border-radius:8px;background:#fff;
    box-shadow:0 12px 28px -8px rgba(15,23,42,.25);overflow:hidden}
  .ddmenu button{display:block;width:100%;text-align:left;padding:8px 12px;font-size:14px;color:#475569}
  .ddmenu button:hover{background:#f0fdfa;color:#0f766e}
  /* nav */
  .nav{display:flex;align-items:center;justify-content:space-between;margin-top:28px}
  .back{display:flex;align-items:center;gap:4px;font-size:14px;color:var(--muted)}
  .back:hover{color:#1e293b}.back:disabled{opacity:.3;cursor:default}
  .cont{display:flex;align-items:center;gap:4px;font-size:14px;font-weight:500;color:#fff;background:#475569;border-radius:8px;padding:8px 16px}
  .cont:hover{background:#334155}
  .cont:disabled{opacity:.4;cursor:not-allowed}.cont:disabled:hover{background:#475569}
  .submit{display:flex;align-items:center;gap:6px;font-size:14px;font-weight:600;color:#fff;background:var(--teal600);border-radius:8px;padding:10px 20px}
  .submit:hover{background:var(--teal)}
  /* bubble */
  .card{width:208px;border-radius:12px;background:#fff;border:1px solid var(--line);box-shadow:0 18px 40px -10px rgba(15,23,42,.35);overflow:hidden}
  .card .hd{display:flex;align-items:center;gap:8px;padding:6px 12px;background:linear-gradient(135deg,#0d9488,#0f766e);color:#fff}
  .card .hd .t{font-size:12px;font-weight:600;flex:1}
  .card .hd button{color:rgba(255,255,255,.8)}.card .hd button:hover{color:#fff}
  .card .bd{padding:8px 12px}
  .card .bd p{margin:0 0 8px;font-size:12px;color:var(--muted);line-height:1.35}
  .card .bd p b{color:#334155}
  .fillbtn{width:100%;display:flex;align-items:center;justify-content:center;gap:6px;font-size:12px;font-weight:600;color:#fff;background:var(--teal600);border-radius:8px;padding:8px}
  .fillbtn:hover{background:var(--teal)}
  .lrow{display:flex;align-items:center;gap:8px;padding:2px 0}
  .lrow .sp{font-size:12px;color:var(--muted)}
  .dot{width:16px;height:16px;border-radius:50%;background:#d1fae5;display:flex;align-items:center;justify-content:center;color:#059669}
  .legend{margin-left:auto;display:flex;align-items:center;gap:4px;font-size:10px;color:#94a3b8}
  .legend .pip{width:8px;height:8px;border-radius:50%;background:#fbbf24}
  .saveq{display:flex;gap:8px}
  .saveq .yes{flex:1;display:flex;align-items:center;justify-content:center;gap:4px;font-size:12px;font-weight:600;color:#fff;background:var(--teal600);border-radius:8px;padding:6px}
  .saveq .yes:hover{background:var(--teal)}
  .saveq .no{flex:1;font-size:12px;font-weight:500;color:var(--muted);border:1px solid var(--line);border-radius:8px;padding:6px}
  .saveq .no:hover{color:#334155}
  .ft{display:flex;align-items:center;gap:8px;padding:6px 12px;border-top:1px solid #f1f5f9;background:#f8fafc}
  .ft .track{flex:1;height:4px;border-radius:999px;background:#e2e8f0;overflow:hidden}
  .ft .fill{height:100%;border-radius:999px;background:#14b8a6;transition:width .5s}
  .ft .num{font-size:10px;color:#94a3b8}
  .ft .pro{display:flex;align-items:center;gap:3px;font-size:10px;font-weight:600;color:#d97706}
  .ft .pro:hover{color:#b45309}
  .fab{width:48px;height:48px;border-radius:50%;box-shadow:0 14px 30px -8px rgba(15,23,42,.4);
    background:linear-gradient(135deg,#0d9488,#0f766e);color:#fff;display:flex;align-items:center;justify-content:center;position:relative}
  .fab .ind{position:absolute;top:-2px;right:-2px;width:12px;height:12px;border-radius:50%;background:#fbbf24;border:2px solid #fff}
  /* overlays */
  .scrim{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:16px;
    background:rgba(15,23,42,.5);pointer-events:auto}
  .scrim.bottom{align-items:flex-end}
  .modal{width:100%;max-width:384px;background:#fff;border-radius:16px;box-shadow:0 24px 60px -12px rgba(15,23,42,.5);display:flex;flex-direction:column}
  .modal .body{padding:24px 24px 16px;overflow-y:auto}
  .modal .badge{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;
    background:linear-gradient(135deg,#0d9488,#0f766e);margin-bottom:12px}
  .modal h2{font-size:16px;font-weight:600;color:#1e293b;margin:0}
  .modal .body>p{font-size:14px;color:var(--muted);line-height:1.5;margin:6px 0 0}
  .modal .extra{margin-top:12px;display:flex;flex-direction:column;gap:12px}
  .modal .foot{padding:16px 24px;border-top:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between}
  .pgdots{display:flex;gap:6px}
  .pgdots span{height:6px;border-radius:999px;background:#e2e8f0;width:6px;transition:all .2s}
  .pgdots span.on{width:20px;background:#14b8a6}
  .modal .go{display:flex;align-items:center;gap:6px;font-size:14px;font-weight:600;color:#fff;background:var(--teal600);border-radius:12px;padding:8px 16px}
  .modal .go:hover{background:var(--teal)}.modal .go:disabled{opacity:.4;cursor:not-allowed}
  .dropzone{width:100%;display:flex;flex-direction:column;align-items:center;gap:8px;border:2px dashed #cbd5e1;border-radius:12px;padding:28px 0;color:#94a3b8}
  .dropzone:hover{border-color:#2dd4bf;background:rgba(240,253,250,.5)}
  .dropzone .s{font-size:14px;color:var(--muted)}.dropzone .xs{font-size:11px;color:#94a3b8}
  .parsed{display:flex;align-items:center;gap:12px;border:1px solid #a7f3d0;background:#ecfdf5;border-radius:12px;padding:12px 14px}
  .parsed .nm{font-size:14px;font-weight:500;color:#334155}.parsed .sm{font-size:11px;color:#059669}
  .welcomegrid{display:flex;gap:8px}
  .wg{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;border:1px solid #f1f5f9;background:#f8fafc;border-radius:12px;padding:12px 0;color:#94a3b8}
  .wg span{font-size:10px}
  .q .ql{font-size:12px;font-weight:500;color:var(--muted);margin-bottom:6px}
  .q .qo{display:flex;gap:8px}
  .q .qo button{flex:1;font-size:14px;border:1px solid var(--line);border-radius:8px;padding:8px;color:var(--muted)}
  .q .qo button:hover{border-color:#5eead4}
  .q .qo button.on{border-color:#2dd4bf;background:#f0fdfa;color:#0f766e;font-weight:500}
  .tonebtn{width:100%;text-align:left;border:2px dashed #cbd5e1;border-radius:12px;padding:12px 14px}
  .tonebtn:hover{border-color:#a78bfa;background:rgba(245,243,255,.5)}
  .tonebtn .lab{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:500;color:#7c3aed;margin-bottom:4px}
  .tonebtn .ph{font-size:14px;color:#cbd5e1;font-style:italic}
  .toneres{border:1px solid #ddd6fe;background:#f5f3ff;border-radius:12px;padding:12px 14px}
  .toneres p{font-size:14px;color:var(--muted);line-height:1.5;font-style:italic;margin:0}
  .toneres .pr{font-size:11px;color:#7c3aed;margin-top:8px;display:flex;align-items:center;gap:4px}
  /* voice sheet */
  .vsheet{width:100%;max-width:384px;background:#fff;border-radius:16px;box-shadow:0 24px 60px -12px rgba(15,23,42,.5);overflow:hidden}
  .vsheet .top{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 0}
  .vsheet .top .ttl{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:#334155}
  .vsheet .mid{padding:24px 20px;display:flex;flex-direction:column;align-items:center}
  .wave{display:flex;align-items:flex-end;gap:4px;height:48px;margin-bottom:16px}
  .wave span{width:6px;border-radius:999px;background:#a78bfa;height:30%;animation:wave 1s ease-in-out infinite}
  .timer{font-size:24px;font-weight:600;color:#334155;font-variant-numeric:tabular-nums}
  .vsheet .mid .hintl{font-size:12px;color:#94a3b8;margin:4px 0 0;text-align:center;max-width:16rem}
  .stopbtn{margin-top:20px;display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:#fff;background:#7c3aed;border-radius:12px;padding:10px 20px}
  .stopbtn:hover{background:#6d28d9}
  /* toast */
  .toast{position:absolute;top:16px;right:16px;max-width:18rem;pointer-events:auto}
  .toast .inner{display:flex;align-items:flex-start;gap:8px;background:#0f172a;color:#fff;font-size:12px;border-radius:12px;padding:12px 14px;
    box-shadow:0 12px 28px -8px rgba(0,0,0,.4);line-height:1.45}
  .toast .inner .c{color:#6ee7b7;flex:none;margin-top:1px}
  /* success */
  .success{max-width:420px;margin:0 auto;text-align:center;padding-top:40px}
  .success .hero{width:64px;height:64px;border-radius:16px;margin:0 auto 20px;display:flex;align-items:center;justify-content:center;color:#fff;
    background:linear-gradient(135deg,#0d9488,#0f766e)}
  .success h2{font-size:24px;font-weight:600;color:#1e293b;margin:0}
  .success>p{font-size:14px;color:var(--muted);line-height:1.5;margin:8px 0 0}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:24px}
  .stat{border:1px solid var(--line);background:#fff;border-radius:12px;padding:12px 0}
  .stat .n{font-size:18px;font-weight:600;color:var(--teal600)}.stat .l{font-size:11px;color:#94a3b8}
  .success .note{font-size:12px;color:#94a3b8;margin-top:24px}
  .tip{font-size:11px;color:#94a3b8;margin:12px auto 0;max-width:900px;text-align:center}
  .spin{animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes wave{0%,100%{height:25%}50%{height:100%}}
  @media (max-width:520px){ .row{grid-template-columns:1fr} #page{padding:20px 18px 120px} }
  @media (prefers-reduced-motion:reduce){ .spin,.wave span,.ft .fill{animation:none!important;transition:none!important} }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="logo">
      <span class="mark" id="logomark"></span>
      <span class="name">CareerCarte</span>
      <span class="sub">interactive prototype · mock data, nothing is real</span>
    </div>
    <button class="restart" data-act="restart"><span id="rsicon"></span> Restart demo</button>
  </div>

  <div class="browser">
    <div class="chrome">
      <div class="dots"><span class="r"></span><span class="y"></span><span class="g"></span></div>
      <div class="addr"><span id="lockicon"></span> jobs.lumenretail.com/careers/apply</div>
      <div class="exticon" id="exticon"></div>
    </div>
    <div class="viewport">
      <div id="page"></div>
      <div id="bubble"></div>
      <div id="overlays"></div>
    </div>
  </div>

  <div class="tip">Click an empty field to fill just that one, use the CareerCarte bubble to fill the whole page, and try the mic on the open question.</div>
</div>

<script>
/* ============================ data ============================ */
const PERSONA = {
  first:"Mara", last:"Ellison", email:"mara.ellison@gmail.com", phone:"(415) 555-0192", location:"Austin, TX",
  headline:"Customer Support Lead", company:"BrightCart", dates:"Mar 2022 – Present",
  summary:"Led a 6-person support team, cut first-response time in half, and built the onboarding flow new hires still use.",
  skills:["CRM","Zendesk","Customer onboarding","Churn reduction"]
};
const JOB = { company:"Lumen Retail", role:"Customer Success Manager" };
const AI_ANSWER = "I've actually been a Lumen customer for years — the time your team sorted out a botched order in five minutes flat, no hoops, no scripts, kind of stuck with me. I want to do that for other people, at scale. I've spent four years turning frustrated customers into regulars, and a CSM role here feels like the next step rather than a leap.";
const TONE_SAMPLE = "Saturday mornings I make terrible pancakes and pretend they're great. My dog disagrees. It's a whole thing.";
const STEPS = ["My information","Experience","Screening","Disclosures","Review"];

const STEP_FIELDS = [
  [ {id:"first",value:PERSONA.first,status:"confident"},{id:"last",value:PERSONA.last,status:"confident"},
    {id:"email",value:PERSONA.email,status:"confident"},{id:"phone",value:PERSONA.phone,status:"confident"},
    {id:"location",value:PERSONA.location,status:"confident"} ],
  [ {id:"company",value:PERSONA.company,status:"cv"},{id:"title",value:PERSONA.headline,status:"cv"},
    {id:"dates",value:PERSONA.dates,status:"cv"},{id:"summary",value:PERSONA.summary,status:"cv"},
    {id:"skills",value:PERSONA.skills.join(", "),status:"cv"} ],
  [ {id:"workAuth",value:"Yes",status:"saved"},{id:"workedHere",value:"No",status:"verify"} ],
  [], []
];
const TARGET = {}; STEP_FIELDS.forEach(a=>a.forEach(f=>TARGET[f.id]=f));
const REQUIRED = {
  0:["first","last","email","phone","location"],
  1:["company","title","dates","summary","skills"],
  2:["workAuth","workedHere","whyJoin"],
  3:["gender","veteran","disability"],
  4:[]
};
const META = {
  confident:{chip:"Filled",cls:"emerald",bar:"#10b981",icon:"check"},
  cv:{chip:"From your CV",cls:"emerald",bar:"#10b981",icon:"file"},
  saved:{chip:"Filled · saved",cls:"emerald",bar:"#10b981",icon:"check"},
  verify:{chip:"Best guess · verify",cls:"amber",bar:"#f59e0b",icon:"alert"},
  voice:{chip:"From your voice",cls:"violet",bar:"#8b5cf6",icon:"mic"},
  manual:{chip:"Your answer",cls:"slate",bar:"#64748b",icon:"pencil"},
  learned:{chip:"Saved for next time",cls:"teal",bar:"#0d9488",icon:"check"}
};
const RING = {emerald:"r-emerald",amber:"r-amber",violet:"r-violet",slate:"r-slate",teal:"r-teal"};

/* ============================ icons ============================ */
const ICONS = {
  sparkles:'<path d="M12 3l1.6 4.4L18 9l-4.4 1.6L12 15l-1.6-4.4L6 9z"/><path d="M19 13l.7 1.9 1.9.7-1.9.7-.7 1.9-.7-1.9-1.9-.7 1.9-.7z"/>',
  mic:'<rect x="9" y="2" width="6" height="11" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/>',
  check:'<polyline points="20 6 9 17 4 12"/>',

const FILLED = new Set(["square","zap"]);
function icon(name,size=16,cls=""){
  return '<svg class="ic '+cls+'" width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="'+(FILLED.has(name)?"currentColor":"none")+
    '" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+ICONS[name]+'</svg>';
}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

/* ============================ state ============================ */
function makeState(){return{
  onboard:true, onb:{step:0,uploaded:false,uploading:false,answers:{},tone:false},
  step:0, vals:{}, panel:"idle", voice:null, recT:0, toast:null, usage:5, submitted:false,
  savePrompt:null, min:false, dd:null, busy:false
};}
let state = makeState();
let toastTimer=null, recInterval=null;

/* ============================ helpers ============================ */
const cap=v=>Math.min(v,10);
function chipHTML(status){const m=META[status];return '<span class="chip '+m.cls+'">'+icon(m.icon,10)+' '+m.chip+'</span>';}

/* ============================ field builders ============================ */
function fieldHTML(id,label,opts){
  opts=opts||{};
  const v=state.vals[id], st=v?v.status:"empty", m=v?META[st]:null;
  const fillable = !v && !!TARGET[id] && !opts.voice;
  const ph = fillable?"Click to autofill…":(opts.voice?"Answer with voice…":"—");
  let right="";
  if(m) right=chipHTML(st);
  else if(fillable) right='<span class="hint">'+icon("mouse",10)+' click to fill</span>';
  const ringCls = m?RING[m.cls]:"";
  const attrs = fillable?('data-act="fill-field" data-id="'+id+'"'):"";
  const bar = m?'<span class="bar" style="background:'+m.bar+'"></span>':"";
  const inner = v?esc(v.value):'<span class="ph">'+ph+'</span>';
  const showVoice = opts.voice && (!v || st==="voice");
  const vbtn = showVoice?'<button class="voicebtn" data-act="voice-open">'+icon("mic",12)+' '+(v?"Redo with voice":"Answer with voice")+'</button>':"";
  return '<div class="field"><div class="frow"><label>'+label+(opts.req?'<span class="req"> *</span>':"")+'</label>'+right+'</div>'+
    '<div class="box '+(opts.area?"area ":"")+(fillable?"fillable ":"")+ringCls+'" '+attrs+'>'+bar+'<div class="val">'+inner+'</div>'+vbtn+'</div>'+
    (opts.hint?'<p class="fhint">'+opts.hint+'</p>':"")+'</div>';
}
function radioHTML(id,label,options,req){
  const v=state.vals[id], st=v?v.status:"empty", m=v?META[st]:null;
  const fillable=!v;
  let right="";
  if(m) right=chipHTML(st);
  else if(fillable) right='<span class="hint">'+icon("mouse",10)+' click to fill</span>';
  const groupAttrs = fillable?('data-act="fill-field" data-id="'+id+'"'):"";
  const opts = options.map(o=>{
    const on = v && v.value===o;
    const amber = on && st==="verify";
    return '<span class="opt'+(on?" on":"")+(amber?" amber":"")+'"><span class="rb">'+(on?'<i></i>':"")+'</span>'+o+'</span>';
  }).join("");
  return '<div class="field"><div class="frow"><label>'+label+(req?'<span class="req"> *</span>':"")+'</label>'+right+'</div>'+
    '<div class="opts '+(fillable?"fillable":"")+'" '+groupAttrs+'>'+opts+'</div></div>';
}
function dropdownHTML(id,label,options,opts){
  opts=opts||{};
  const v=state.vals[id], st=v?v.status:"empty";
  const chip = st==="learned"?chipHTML("learned"):st==="manual"?chipHTML("manual"):"";
  const barColor = st==="learned"?"#0d9488":"#64748b";
  const open = state.dd===id;
  const bar = v?'<span class="bar" style="background:'+barColor+'"></span>':"";
  const menu = open?('<div class="ddmenu">'+options.map(o=>'<button data-act="dd-pick" data-id="'+id+'" data-val="'+esc(o)+'" data-savable="'+(opts.savable?"1":"0")+'" data-label="'+esc(label)+'">'+o+'</button>').join("")+'</div>'):"";
  return '<div class="field"><div class="frow"><label>'+label+(opts.req?'<span class="req"> *</span>':"")+'</label>'+chip+'</div>'+
    '<div class="dropdown"><button class="ddbtn '+(v?"set":"")+' '+(open?"open":"")+'" data-act="dd-toggle" data-id="'+id+'">'+
      '<span class="lft">'+bar+(v?esc(v.value):"Select…")+'</span>'+icon("cdown",14,"chev")+'</button>'+menu+'</div>'+
    (opts.hint?'<p class="fhint">'+opts.hint+'</p>':"")+'</div>';
}

/* ============================ page ============================ */
function stepperHTML(){
  return '<div class="stepper">'+STEPS.map((s,i)=>'<div class="col '+(i<=state.step?"done":"")+' '+(i===state.step?"cur":"")+'"><div class="tick"></div><div class="lbl">'+s+'</div></div>').join("")+'</div>';
}
function reviewHTML(){
  const v=state.vals;
  const rows=[
    ["Name",(v.first?v.first.value:"—")+" "+(v.last?v.last.value:"")],
    ["Email",v.email&&v.email.value],
    ["Phone",v.phone&&v.phone.value],
    ["Most recent",v.title?(v.title.value+" · "+(v.company?v.company.value:"")):"—"],
    ["Work authorized",v.workAuth&&v.workAuth.value],
    ["Worked here before",v.workedHere&&v.workedHere.value],
    ["Why this role",v.whyJoin&&v.whyJoin.value?"Answered ✓":"—"]
  ];
  return '<div><p style="font-size:12px;color:#94a3b8;margin:0 0 8px">Quick review before you send.</p>'+
    '<div style="border:1px solid var(--line);border-radius:12px;overflow:hidden">'+
    rows.map((r,i)=>'<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;'+(i?"border-top:1px solid #f1f5f9":"")+'">'+
      '<span style="font-size:12px;color:#94a3b8">'+r[0]+'</span><span style="font-size:14px;color:#334155">'+(r[1]||"—")+'</span></div>').join("")+'</div></div>';
}
function pageHTML(){
  if(state.submitted) return successHTML();
  let body="";
  const s=state.step;
  if(s===0){
    body='<div class="row">'+fieldHTML("first","First name",{req:1})+fieldHTML("last","Last name",{req:1})+'</div>'+
      fieldHTML("email","Email",{req:1})+
      '<div class="row">'+fieldHTML("phone","Phone",{req:1})+fieldHTML("location","Location",{req:1})+'</div>';
  } else if(s===1){
    body='<p style="font-size:12px;color:#94a3b8;margin:0">Most recent role</p>'+
      '<div class="row">'+fieldHTML("company","Company",{req:1})+fieldHTML("title","Title",{req:1})+'</div>'+
      fieldHTML("dates","Dates",{req:1})+fieldHTML("summary","What did you do here?",{area:1,req:1})+fieldHTML("skills","Top skills",{req:1});
  } else if(s===2){
    body=radioHTML("workAuth","Are you legally authorized to work in the US?",["Yes","No"],1)+
      radioHTML("workedHere","Have you previously worked at "+JOB.company+"?",["Yes","No"],1)+
      fieldHTML("whyJoin","Why do you want to work at "+JOB.company+"?",{area:1,voice:1,req:1})+
      dropdownHTML("heardAbout","How did you hear about this role?",["LinkedIn","Indeed","Referral","Company website","Other"],{});
  } else if(s===3){
    body=dropdownHTML("gender","Gender",["Woman","Man","Non-binary","Prefer not to say"],{savable:1,req:1})+
      dropdownHTML("veteran","Veteran status",["Not a protected veteran","Protected veteran","Prefer not to say"],{savable:1,req:1})+
      dropdownHTML("disability","Disability status",["No","Yes","Prefer not to say"],{savable:1,req:1});
  } else {
    body=reviewHTML();
  }
  const canNext = REQUIRED[s].every(id=>state.vals[id]);
  const nav='<div class="nav">'+
    '<button class="back" data-act="back" '+(s===0?"disabled":"")+'>'+icon("cleft",16)+' Back</button>'+
    (s<4
      ? '<button class="cont" data-act="next" '+(canNext?"":"disabled")+'>Continue '+icon("cright",16)+'</button>'
      : '<button class="submit" data-act="submit">Submit application '+icon("check",16)+'</button>')+
    '</div>';
  return '<div class="form"><div class="jobhead"><div class="eyebrow">'+JOB.company+' · Careers</div><h1>'+JOB.role+'</h1><p>Application · 5 short steps</p></div>'+
    stepperHTML()+'<div class="fields">'+body+'</div>'+nav+'</div>';
}
function successHTML(){
  const stats=[["~11 min","saved"],["1","voice answer"],["100%","in your tone"]];
  return '<div class="success"><div class="hero">'+icon("sparkles",28)+'</div>'+
    '<h2>Application submitted</h2>'+
    '<p>CareerCarte filled the heavy lifting across 5 pages — you reviewed the one amber guess and recorded one answer.</p>'+
    '<div class="stats">'+stats.map(s=>'<div class="stat"><div class="n">'+s[0]+'</div><div class="l">'+s[1]+'</div></div>').join("")+'</div>'+
    '<p class="note">Your work-authorization answer was saved — the next application starts further ahead.</p></div>';
}

/* ============================ bubble ============================ */
function bubbleHTML(){
  if(state.submitted) return "";
  const s=state.step;
  const hasAI = STEP_FIELDS[s].length>0;
  const stepFilled = hasAI && STEP_FIELDS[s].every(f=>state.vals[f.id]);
  const working = state.panel==="reading"||state.panel==="filling";
  const offering = hasAI && !stepFilled && !working;

  if(state.min){
    const ind=(offering||state.savePrompt)?'<span class="ind"></span>':"";
    return '<button class="fab" data-act="min">'+icon("sparkles",18)+ind+'</button>';
  }
  let bd="";
  if(state.savePrompt){
    bd='<p>Save your <b>'+esc(state.savePrompt.label)+'</b> answer? I\'ll fill it automatically next time.</p>'+
      '<div class="saveq"><button class="yes" data-act="save-yes">'+icon("check",12)+' Save</button>'+
      '<button class="no" data-act="save-no">Not now</button></div>';
  } else if(working){
    bd='<div class="lrow">'+icon("loader",14,"spin")+' <span class="sp">'+(state.panel==="reading"?"Reading this page…":"Filling in your details…")+'</span></div>';
  } else if(!hasAI){
    bd='<div class="lrow" style="align-items:flex-start">'+icon("sparkles",13)+' <span class="sp">I don\'t know these yet — pick your answers and I\'ll remember them.</span></div>';
  } else if(offering){
    bd='<p>Fill <b>'+STEPS[s]+'</b> for you?</p><button class="fillbtn" data-act="fill-page">'+icon("zap",13)+' Fill this page</button>';
  } else {
    bd='<div class="lrow"><span class="dot">'+icon("check",10)+'</span><span class="sp">Page filled.</span><span class="legend"><span class="pip"></span>verify</span></div>';
  }
  return '<div class="card"><div class="hd">'+icon("sparkles",13)+'<span class="t">CareerCarte</span><button data-act="min">'+icon("minus",14)+'</button></div>'+
    '<div class="bd">'+bd+'</div>'+
    '<div class="ft"><div class="track"><div class="fill" style="width:'+(state.usage*10)+'%"></div></div>'+
    '<span class="num">'+state.usage+'/10</span>'+
    '<button class="pro" data-act="pro">'+icon("crown",10)+' Pro</button></div></div>';
}

/* ============================ overlays ============================ */
function onboardHTML(){
  const o=state.onb, last=4;
  const canNext = o.step===0?true : o.step===1?o.uploaded : o.step===2?(o.answers.auth&&o.answers.notice) : o.step===3?o.tone : true;
  let body="";
  if(o.step===0){
    body=pane("sparkles","Welcome to CareerCarte","Fill any job application in seconds — reliably. Three quick setups and you're ready.",
      '<div class="welcomegrid">'+
        '<div class="wg">'+icon("file",16)+'<span>CV</span></div>'+
        '<div class="wg">'+icon("msg",16)+'<span>Q&amp;A</span></div>'+
        '<div class="wg">'+icon("mic",16)+'<span>Voice</span></div></div>');
  } else if(o.step===1){
    const inner = o.uploaded
      ? '<div class="parsed">'+icon("file",18)+'<div style="flex:1"><div class="nm">Mara_Ellison_CV.pdf</div><div class="sm">Parsed · 4 roles · 11 skills found</div></div>'+icon("check",16)+'</div>'
      : '<button class="dropzone" data-act="onb-upload" '+(o.uploading?"disabled":"")+'>'+(o.uploading?icon("loader",22,"spin"):icon("upload",22))+
        '<span class="s">'+(o.uploading?"Reading your CV…":"Click to upload your CV")+'</span><span class="xs">PDF or DOCX · mock</span></button>';
    body=pane("upload","Add your CV","I read it once and remember your roles, dates and skills — no retyping on every site.",inner);
  } else if(o.step===2){
    body=pane("msg","Answer a few once","Tap an answer. I'll reuse it everywhere this question shows up.",
      questionHTML("Are you authorized to work in the US?","auth",["Yes","Need sponsorship"])+
      questionHTML("Notice period","notice",["2 weeks","1 month"]));
  } else if(o.step===3){
    const inner = o.tone
      ? '<div class="toneres"><p>“'+TONE_SAMPLE+'”</p><div class="pr">'+icon("wand",11)+' Voice profile: warm · casual · a little funny</div></div>'
      : '<button class="tonebtn" data-act="onb-tone"><span class="lab">'+icon("mic",11)+' tap to drop in an example</span><span class="ph">Tell me about your weekend…</span></button>';
    body=pane("pencil","Sound like you","Drop in a couple of non-work lines — no AI. I learn your tone so drafts read like you and slip past AI-detectors.",inner);
  } else {
    body=pane("check","You're set","Open the application below. I'll offer to fill each page — or click any empty field to fill just that one.","");
  }
  const dots='<div class="pgdots">'+[0,1,2,3,4].map(i=>'<span class="'+(i===o.step?"on":"")+'"></span>').join("")+'</div>';
  const cta='<button class="go" data-act="onb-next" '+(canNext?"":"disabled")+'>'+(o.step===last?"Start applying":"Continue")+' '+icon("cright",15)+'</button>';
  return '<div class="scrim"><div class="modal" style="max-height:510px"><div class="body">'+body+'</div><div class="foot">'+dots+cta+'</div></div></div>';
}
function pane(ic,title,bodyText,extra){
  return '<div><div class="badge">'+icon(ic,18)+'</div><h2>'+title+'</h2><p>'+bodyText+'</p>'+(extra?'<div class="extra">'+extra+'</div>':"")+'</div>';
}
function questionHTML(label,key,options){
  const sel=state.onb.answers[key];
  return '<div class="q"><div class="ql">'+label+'</div><div class="qo">'+
    options.map(o=>'<button class="'+(sel===o?"on":"")+'" data-act="onb-pick" data-q="'+key+'" data-val="'+esc(o)+'">'+o+'</button>').join("")+'</div></div>';
}
function voiceHTML(){
  if(state.voice==="recording"){
    const bars=[0,1,2,3,4,5,6,7,8].map(i=>'<span style="animation-delay:'+(i*0.09)+'s"></span>').join("");
    return '<div class="scrim bottom"><div class="vsheet"><div class="top"><div class="ttl">'+icon("mic",16)+' Answer with voice</div>'+
      '<button data-act="voice-close">'+icon("x",18)+'</button></div>'+
      '<div class="mid"><div class="wave">'+bars+'</div><div class="timer" id="rectime">'+fmt(state.recT)+'</div>'+
      '<p class="hintl">Just ramble — I\'ll cut the filler and keep your voice.</p>'+
      '<button class="stopbtn" data-act="voice-stop">'+icon("square",13)+' Stop &amp; draft</button></div></div></div>';
  }
  return '<div class="scrim bottom"><div class="vsheet"><div class="top"><div class="ttl">'+icon("mic",16)+' Answer with voice</div></div>'+
    '<div class="mid">'+icon("loader",28,"spin")+'<div style="font-size:14px;font-weight:500;color:#334155;margin-top:12px">Cleaning up your answer…</div>'+
    '<p class="hintl">Removing filler · rewriting in your voice</p></div></div></div>';
}
function toastHTML(){
  return '<div class="toast"><div class="inner"><span class="c">'+icon("check",15)+'</span><span>'+state.toast+'</span></div></div>';
}
function overlaysHTML(){
  let h="";
  if(state.toast) h+=toastHTML();
  if(state.voice) h+=voiceHTML();
  if(state.onboard) h+=onboardHTML();
  return h;
}
function fmt(t){return Math.floor(t/60)+":"+String(t%60).padStart(2,"0");}

/* ============================ render ============================ */
function renderPage(){document.getElementById("page").innerHTML=pageHTML();}
function renderBubble(){document.getElementById("bubble").innerHTML=bubbleHTML();}
function renderOverlays(){document.getElementById("overlays").innerHTML=overlaysHTML();}
function renderAll(){renderPage();renderBubble();renderOverlays();}

/* ============================ actions ============================ */
function showToast(msg){state.toast=msg;clearTimeout(toastTimer);renderOverlays();toastTimer=setTimeout(()=>{state.toast=null;renderOverlays();},3400);}
function fillField(id){
  if(state.vals[id]) return; const f=TARGET[id]; if(!f) return;
  state.vals[id]={value:f.value,status:f.status}; state.usage=cap(state.usage+1);
  if(f.status==="saved") showToast("Saved to your profile — we'll reuse this answer on future applications.");
  renderPage(); renderBubble();
}
function fillPage(){
  if(state.busy) return;
  const fields=STEP_FIELDS[state.step].filter(f=>!state.vals[f.id]);
  if(!fields.length) return;
  state.busy=true; state.panel="reading"; renderBubble();
  setTimeout(()=>{
    state.panel="filling"; renderBubble();
    fields.forEach((f,i)=>setTimeout(()=>{
      state.vals[f.id]={value:f.value,status:f.status}; renderPage();
      if(i===fields.length-1){
        state.panel="done"; state.busy=false; state.usage=cap(state.usage+1);
        if(fields.some(x=>x.status==="saved")) showToast("Saved to your profile — we'll reuse this answer on future applications.");
        renderBubble();
      }
    },260+i*220));
  },620);
}
function pick(id,val,savable,label){
  const already = state.vals[id] && state.vals[id].status==="learned";
  state.vals[id]={value:val,status:already?"learned":"manual"}; state.dd=null;
  if(savable && !already) state.savePrompt={id:id,label:label};
  renderPage(); renderBubble();
}
function saveAnswer(){
  if(!state.savePrompt) return;
  const cur=state.vals[state.savePrompt.id];
  state.vals[state.savePrompt.id]={value:cur.value,status:"learned"};
  state.usage=cap(state.usage+1);
  showToast("Saved — I'll autofill “"+state.savePrompt.label+"” on future applications.");
  state.savePrompt=null; renderPage(); renderBubble();
}
function nextStep(){state.step=Math.min(state.step+1,4);state.panel="idle";state.dd=null;renderAll();}
function backStep(){state.step=Math.max(state.step-1,0);state.panel="idle";state.dd=null;renderAll();}
function openVoice(){clearInterval(recInterval);state.voice="recording";state.recT=0;renderOverlays();recInterval=setInterval(()=>{state.recT++;const el=document.getElementById("rectime");if(el)el.textContent=fmt(state.recT);},1000);}
function stopVoice(){
  clearInterval(recInterval); state.voice="cleaning"; renderOverlays();
  setTimeout(()=>{
    state.vals["whyJoin"]={value:AI_ANSWER,status:"voice"}; state.usage=cap(state.usage+1); state.voice=null;
    showToast("Removed 14 filler words · rewritten in your voice."); renderAll();
  },1700);
}
function closeVoice(){clearInterval(recInterval);state.voice=null;renderOverlays();}
function onbNext(){const o=state.onb;if(o.step===4){state.onboard=false;renderAll();}else{o.step++;renderOverlays();}}
function onbUpload(){state.onb.uploading=true;renderOverlays();setTimeout(()=>{state.onb.uploading=false;state.onb.uploaded=true;renderOverlays();},1100);}

/* ============================ events ============================ */
document.addEventListener("click",function(e){
  const t=e.target.closest("[data-act]"); if(!t) return;
  const a=t.dataset.act, d=t.dataset;
  switch(a){
    case "restart": state=makeState(); renderAll(); break;
    case "onb-next": onbNext(); break;
    case "onb-upload": onbUpload(); break;
    case "onb-pick": state.onb.answers[d.q]=d.val; renderOverlays(); break;
    case "onb-tone": state.onb.tone=true; showToast("Voice profile saved: warm · casual · a little funny."); renderOverlays(); break;
    case "fill-page": fillPage(); break;
    case "fill-field": fillField(d.id); break;
    case "voice-open": openVoice(); break;
    case "voice-stop": stopVoice(); break;
    case "voice-close": closeVoice(); break;
    case "dd-toggle": state.dd = state.dd===d.id?null:d.id; renderPage(); break;
    case "dd-pick": pick(d.id,d.val,d.savable==="1",d.label); break;
    case "save-yes": saveAnswer(); break;
    case "save-no": state.savePrompt=null; renderBubble(); break;
    case "next": nextStep(); break;
    case "back": backStep(); break;
    case "submit": state.submitted=true; renderAll(); break;
    case "min": state.min=!state.min; renderBubble(); break;
    case "pro": showToast("Pro is mocked for this demo — this is where the upgrade would live."); break;
  }
});
